# This workflow will build wglinfo on Windows
name: Build (Windows/MinGW64)

on:
  workflow_call:

jobs:
  build-windows-mingw:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        path: wglinfo.git
        fetch-depth: 1
    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: ucrt64
        update: true
        install: >-
          git
          make
        pacboy: >-
          toolchain:p
          cmake:p
          ninja:p
    - name: Configure wglinfo
      env:
        WGLINFO_CONFIG: |
          set(BUILD_TREAT_WARNINGS_AS_ERRORS ON CACHE BOOL "")
          #set(WGLINFO_BUILD_TAG "mingw-w64-ucrt-x86_64-gcc" CACHE STRING "")
          set(CMAKE_BUILD_TYPE     Release)
          set(CMAKE_INSTALL_PREFIX "${CMAKE_CURRENT_LIST_DIR}/wglinfo-install" CACHE PATH "")
      run: |
        echo "${WGLINFO_CONFIG}" | tee ./wglinfo-make.cmake
        cmake -S ./wglinfo.git -B ./wglinfo-make -G Ninja --toolchain "$PWD/wglinfo-make.cmake"
    - name: Build wglinfo
      run: |
        cmake --build ./wglinfo-make
    - name: Install wglinfo
      run: |
        cmake --install ./wglinfo-make --prefix ./wglinfo-install
    - name: Run wglinfo
      run: |
        ./wglinfo-install/wglinfo.exe
        ./wglinfo-install/wglinfo.exe > ./wglinfo-install/wglinfo.log
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wglinfo-windows-x86_64-mingw
        path: wglinfo-install
        if-no-files-found: error
