# This workflow will build wglinfo on Linux to WebAssembly
name: Build (WebAssembly)

on:
  # allows to run workflow manually
  workflow_dispatch:
  workflow_call:

# permissions of the GITHUB_TOKEN to allow deployment to Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        path: wglinfo.git
        fetch-depth: 1
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake ninja-build
    - name: Setup emsdk
      uses: mymindstorm/setup-emsdk@v14
      with:
        version: 4.0.5
        actions-cache-folder: 'emsdk-cache'
        no-cache: true
    - name: Configure wglinfo
      env:
        WGLINFO_CONFIG: |
          set(BUILD_TREAT_WARNINGS_AS_ERRORS ON CACHE BOOL "")
          include($ENV{EMSDK}/upstream/emscripten/cmake/Modules/Platform/Emscripten.cmake)
          set(CMAKE_BUILD_TYPE     Release)
          set(CMAKE_INSTALL_PREFIX "${CMAKE_CURRENT_LIST_DIR}/wglinfo-install" CACHE PATH "")
      run: |
        echo "${WGLINFO_CONFIG}" | tee ./wglinfo-make.cmake
        emcc -v
        cmake -S ./wglinfo.git -B ./wglinfo-make -G Ninja --toolchain "$PWD/wglinfo-make.cmake"
    - name: Build wglinfo
      run: |
        cmake --build ./wglinfo-make
    - name: Install wglinfo
      run: |
        cmake --install ./wglinfo-make --prefix ./wglinfo-install
        cp ./wglinfo-install/wglinfo.html ./wglinfo-install/index.html
    - name: Upload artifacts
      id: deployment
      uses: actions/upload-pages-artifact@v3
      with:
        path: wglinfo-install/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.ref == 'refs/heads/master' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to Pages
      id: deployment
      uses: actions/deploy-pages@v4
